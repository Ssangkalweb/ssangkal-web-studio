<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#071a35">
  <title>페이지를 찾을 수 없습니다 | 쌍칼 웹 스튜디오</title>
  <link rel="icon" href="https://ssangkalweb.github.io/ssangkal-web-studio/favicon.svg" type="image/svg+xml">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      margin: 0;
      padding: 24px;
      color: #ffffff;
      background: linear-gradient(145deg, #071a35 0%, #0a2142 58%, #12366a 100%);
      font-family: Arial, "Apple SD Gothic Neo", sans-serif;
      line-height: 1.7;
    }

    main {
      width: min(100%, 640px);
      padding: clamp(36px, 8vw, 64px);
      text-align: center;
      background: rgba(7, 26, 53, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 22px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.3);
    }

    .code {
      display: inline-block;
      margin-bottom: 14px;
      color: #9fc0ff;
      font-size: clamp(52px, 16vw, 88px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.05em;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 7vw, 42px);
      line-height: 1.3;
      word-break: keep-all;
    }

    p {
      max-width: 470px;
      margin: 18px auto 30px;
      color: #dce5f2;
      font-size: clamp(16px, 3vw, 18px);
      word-break: keep-all;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 12px 24px;
      color: #ffffff;
      background: #2f6fed;
      border: 2px solid transparent;
      border-radius: 9px;
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      background: #245fda;
    }

    a:focus-visible {
      outline: 3px solid #ffffff;
      outline-offset: 4px;
    }

    @media (max-width: 430px) {
      body {
        padding: 16px;
      }

      main {
        padding: 38px 22px;
        border-radius: 16px;
      }

      a {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main>
    <span class="code" aria-hidden="true">404</span>
    <h1>페이지를 찾을 수 없습니다</h1>
    <p>요청하신 페이지가 이동되었거나 현재 제공되지 않을 수 있습니다. 아래 버튼을 눌러 홈페이지에서 다시 살펴보세요.</p>
    <a href="https://ssangkalweb.github.io/ssangkal-web-studio/">홈페이지로 돌아가기</a>
  </main>
</body>
</html>
